[build]
  publish = "."

[[redirects]]
  from = "/services"
  to = "/pages/services/translation.html"
  status = 301

[[redirects]]
  from = "/translation"
  to = "/pages/services/translation.html"
  status = 301

[[redirects]]
  from = "/interpretation"
  to = "/pages/services/interpretation.html"
  status = 301

[[redirects]]
  from = "/508-compliance"
  to = "/pages/services/508-compliance.html"
  status = 301

[[redirects]]
  from = "/captioning"
  to = "/pages/services/captioning.html"
  status = 301

[[redirects]]
  from = "/transcription"
  to = "/pages/services/transcription.html"
  status = 301

[[redirects]]
  from = "/desktop-publishing"
  to = "/pages/services/desktop-publishing.html"
  status = 301

[[redirects]]
  from = "/ai-automation"
  to = "/pages/services/ai-automation.html"
  status = 301

[[redirects]]
  from = "/government"
  to = "/pages/industries/government.html"
  status = 301

[[redirects]]
  from = "/schools"
  to = "/pages/industries/schools.html"
  status = 301

[[redirects]]
  from = "/healthcare"
  to = "/pages/industries/healthcare.html"
  status = 301

[[redirects]]
  from = "/legal"
  to = "/pages/industries/legal.html"
  status = 301

[[redirects]]
  from = "/nonprofits"
  to = "/pages/industries/nonprofits.html"
  status = 301

[[redirects]]
  from = "/compliance-faq"
  to = "/pages/resources/compliance-faq.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
