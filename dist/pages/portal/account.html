<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Settings — Taika Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/portal.css" />
  <style>
    :root {
      --navy: #0B1E35;
      --gold: #B8913A;
      --white: #F9F8F5;
    }

    /* ── Page scaffold ── */
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #f4f3f0;
      color: var(--navy);
    }

    .page-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--navy);
      margin: 0 0 1.75rem;
    }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(11,30,53,.08);
      padding: 1.75rem 2rem;
      margin-bottom: 1.5rem;
    }

    .card-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      color: var(--navy);
      margin: 0 0 1.25rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid rgba(11,30,53,.1);
    }

    /* ── Forms ── */
    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: .35rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .form-group input {
      width: 100%;
      box-sizing: border-box;
      padding: .65rem .85rem;
      border: 1.5px solid #d0cdc8;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--navy);
      background: var(--white);
      transition: border-color .2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--gold);
    }

    .form-group input[readonly] {
      background: #ece9e4;
      color: #6b6358;
      cursor: not-allowed;
    }

    .helper-text {
      font-size: .78rem;
      color: #8a7e72;
      margin-top: .3rem;
    }

    /* ── Buttons ── */
    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .65rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
    }

    .btn-gold:hover { background: #a07d30; }
    .btn-gold:disabled { opacity: .55; cursor: not-allowed; }

    /* ── Inline messages ── */
    .inline-message {
      display: none;
      padding: .65rem .9rem;
      border-radius: 6px;
      font-size: .9rem;
      margin-top: .85rem;
    }

    .inline-message.success {
      display: block;
      background: #e6f4ea;
      color: #1a6b35;
      border: 1px solid #b7dfbf;
    }

    .inline-message.error {
      display: block;
      background: #fdecea;
      color: #b71c1c;
      border: 1px solid #f5b7b3;
    }

    /* ── Password strength ── */
    .strength-bar-wrap {
      height: 4px;
      background: #ddd;
      border-radius: 4px;
      margin-top: .5rem;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      border-radius: 4px;
      transition: width .3s, background .3s;
      width: 0;
    }

    .strength-label {
      font-size: .78rem;
      margin-top: .25rem;
      color: #8a7e72;
    }

    /* ── Account info ── */
    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .55rem 0;
      border-bottom: 1px solid #ece9e4;
      font-size: .93rem;
    }

    .info-row:last-child { border-bottom: none; }

    .info-label { color: #6b6358; }

    .badge {
      display: inline-block;
      padding: .2rem .65rem;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .badge-client {
      background: rgba(184,145,58,.12);
      color: var(--gold);
    }

    .support-link {
      color: var(--gold);
      text-decoration: none;
      font-size: .9rem;
    }

    .support-link:hover { text-decoration: underline; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--navy);
      color: var(--white);
      padding: .75rem 1.5rem;
      border-radius: 8px;
      font-size: .92rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 1000;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- Portal nav injected by portal.js -->
<div id="portal-nav"></div>

<div class="page-wrapper">
  <h1 class="page-title">Account Settings</h1>

  <!-- ── SECTION 1: Profile Information ── -->
  <div class="card">
    <h2 class="card-heading">Profile Information</h2>
    <form id="profile-form" novalidate>
      <div class="form-group">
        <label for="full-name">Full Name <span style="color:#c0392b">*</span></label>
        <input type="text" id="full-name" name="full_name" required placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label for="organization">Organization</label>
        <input type="text" id="organization" name="organization" placeholder="Company or organization" />
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 555 000 0000" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" readonly tabindex="-1" />
        <p class="helper-text">Email cannot be changed.</p>
      </div>
      <button type="submit" class="btn-gold" id="save-profile-btn">Save Changes</button>
      <div id="profile-message" class="inline-message"></div>
    </form>
  </div>

  <!-- ── SECTION 2: Change Password ── -->
  <div class="card">
    <h2 class="card-heading">Change Password</h2>
    <form id="password-form" novalidate>
      <div class="form-group" id="current-password-group">
        <label for="current-password">Current Password <span style="color:#c0392b">*</span></label>
        <input type="password" id="current-password" name="current_password" autocomplete="current-password" />
      </div>
      <div class="form-group">
        <label for="new-password">New Password <span style="color:#c0392b">*</span></label>
        <input type="password" id="new-password" name="new_password" required minlength="8" autocomplete="new-password" placeholder="Minimum 8 characters" />
        <div class="strength-bar-wrap"><div class="strength-bar" id="strength-bar"></div></div>
        <p class="strength-label" id="strength-label"></p>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm New Password <span style="color:#c0392b">*</span></label>
        <input type="password" id="confirm-password" name="confirm_password" required autocomplete="new-password" placeholder="Repeat new password" />
      </div>
      <button type="submit" class="btn-gold" id="update-password-btn">Update Password</button>
      <div id="password-message" class="inline-message"></div>
    </form>
  </div>

  <!-- ── SECTION 3: Account Info ── -->
  <div class="card">
    <h2 class="card-heading">Account</h2>
    <div class="info-row">
      <span class="info-label">Account type</span>
      <span class="badge badge-client">Client</span>
    </div>
    <div class="info-row">
      <span class="info-label">Member since</span>
      <span id="member-since">—</span>
    </div>
    <div class="info-row" style="border-bottom:none; padding-top:.85rem;">
      <a href="mailto:support@teamtaika.com" class="support-link">Need help? Contact support →</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../js/portal.js"></script>
<script>
(async function () {
  'use strict';

  const SUPABASE_URL = 'https://ijwgdzrunkxrpzsrcqir.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_UmQ1ni6871mzup_Wz7oO6w_pbqYinV5';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ── Auth guard — also handles password-recovery hash ── */
  let currentUser = null;
  let isRecoverySession = false;

  // Supabase puts access_token in hash for recovery links — exchange it for a session
  const hashParams = new URLSearchParams(window.location.hash.slice(1));
  if (hashParams.get('type') === 'recovery' && hashParams.get('access_token')) {
    const { data, error } = await client.auth.setSession({
      access_token:  hashParams.get('access_token'),
      refresh_token: hashParams.get('refresh_token') || ''
    });
    if (!error && data.session) {
      currentUser = data.session.user;
      isRecoverySession = true;
    }
  }

  if (!currentUser) {
    try {
      currentUser = await requireAuth();
    } catch (_) {
      const { data: { session } } = await client.auth.getSession();
      if (!session) { window.location.href = '/portal'; return; }
      currentUser = session.user;
    }
  }

  // Check if this is a recovery session via onAuthStateChange
  client.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') isRecoverySession = true;
  });

  /* ── Toast helper ── */
  function showToast(msg, duration = 3000) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), duration);
  }

  function showMessage(elId, text, type) {
    const el = document.getElementById(elId);
    el.textContent = text;
    el.className = 'inline-message ' + type;
  }

  function hideMessage(elId) {
    const el = document.getElementById(elId);
    el.className = 'inline-message';
    el.textContent = '';
  }

  /* ── Load profile ── */
  async function loadProfile() {
    const { data: profile, error } = await client
      .from('profiles')
      .select('full_name, organization, phone, created_at')
      .eq('id', currentUser.id)
      .single();

    document.getElementById('email').value = currentUser.email || '';

    if (profile) {
      document.getElementById('full-name').value    = profile.full_name   || '';
      document.getElementById('organization').value = profile.organization || '';
      document.getElementById('phone').value        = profile.phone        || '';

      if (profile.created_at) {
        const d = new Date(profile.created_at);
        document.getElementById('member-since').textContent = d.toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
      }
    }

    if (error) console.warn('Profile load error:', error.message);
  }

  if (typeof renderPortalNav === 'function') renderPortalNav('portal-nav');
  await loadProfile();

  /* Hide current-password field when in recovery mode */
  if (isRecoverySession) {
    const cpGroup = document.getElementById('current-password-group');
    if (cpGroup) cpGroup.style.display = 'none';
    // Show a helpful banner
    const pwCard = document.querySelector('#password-form').closest('.card');
    const banner = document.createElement('div');
    banner.className = 'inline-message info';
    banner.style.cssText = 'margin-bottom:1rem;padding:.75rem 1rem;background:#e8f4fd;border-radius:6px;color:#0B1E35;border-left:4px solid #B8913A;';
    banner.textContent = 'Set a new password for your account.';
    pwCard.querySelector('h2').after(banner);
  }

  /* ── Profile save ── */
  document.getElementById('profile-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideMessage('profile-message');

    const full_name    = document.getElementById('full-name').value.trim();
    const organization = document.getElementById('organization').value.trim();
    const phone        = document.getElementById('phone').value.trim();

    if (!full_name) {
      showMessage('profile-message', 'Full name is required.', 'error');
      return;
    }

    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const { error } = await client
      .from('profiles')
      .update({ full_name, organization, phone })
      .eq('id', currentUser.id);

    btn.disabled = false;
    btn.textContent = 'Save Changes';

    if (error) {
      showMessage('profile-message', 'Error saving profile: ' + error.message, 'error');
    } else {
      showToast('Profile updated!');
    }
  });

  /* ── Password strength meter ── */
  function getStrength(pw) {
    if (!pw) return { score: 0, label: '', color: '' };
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;

    const levels = [
      { label: '',          color: '' },
      { label: 'Weak',      color: '#e74c3c' },
      { label: 'Fair',      color: '#e67e22' },
      { label: 'Good',      color: '#f1c40f' },
      { label: 'Strong',    color: '#27ae60' },
      { label: 'Very strong', color: '#1a8a50' }
    ];
    return { score, ...levels[Math.min(score, 5)] };
  }

  document.getElementById('new-password').addEventListener('input', function () {
    const { score, label, color } = getStrength(this.value);
    const bar   = document.getElementById('strength-bar');
    const lbl   = document.getElementById('strength-label');
    bar.style.width      = (score / 5 * 100) + '%';
    bar.style.background = color;
    lbl.textContent      = label;
    lbl.style.color      = color || '#8a7e72';
  });

  /* ── Password change ── */
  document.getElementById('password-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideMessage('password-message');

    const currentPw = document.getElementById('current-password').value;
    const newPw     = document.getElementById('new-password').value;
    const confirmPw = document.getElementById('confirm-password').value;

    if (!isRecoverySession && !currentPw) {
      showMessage('password-message', 'Please enter your current password.', 'error');
      return;
    }
    if (newPw.length < 8) {
      showMessage('password-message', 'New password must be at least 8 characters.', 'error');
      return;
    }
    if (newPw !== confirmPw) {
      showMessage('password-message', 'Passwords do not match.', 'error');
      return;
    }

    const btn = document.getElementById('update-password-btn');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    /* In recovery mode, skip re-auth — session already proves ownership */
    if (!isRecoverySession) {
      const { error: signInErr } = await client.auth.signInWithPassword({
        email: currentUser.email,
        password: currentPw
      });
      if (signInErr) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        showMessage('password-message', 'Current password is incorrect.', 'error');
        return;
      }
    }

    const { error } = await client.auth.updateUser({ password: newPw });

    btn.disabled = false;
    btn.textContent = 'Update Password';

    if (error) {
      showMessage('password-message', 'Error updating password: ' + error.message, 'error');
    } else {
      showToast('Password updated successfully!');
      document.getElementById('password-form').reset();
      document.getElementById('strength-bar').style.width = '0';
      document.getElementById('strength-label').textContent = '';
    }
  });

})();
</script>
</body>
</html>
