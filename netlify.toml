[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://cdn.jsdelivr.net https://www.paypalobjects.com https://www.paypal.com https://www.sandbox.paypal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com https://*.supabase.co https://api.resend.com https://translation.googleapis.com https://www.paypal.com https://ipnpb.paypal.com; frame-src https://www.paypal.com https://www.sandbox.paypal.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self';"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/css/*"
  [headers.values]
    # Revalidate on every load (cheap 304 if unchanged) so CSS edits always
    # reach visitors without needing a ?v= bump or a manual cache clear.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    # Revalidate each load (cheap 304 when unchanged) so JS edits reach
    # returning visitors even if the ?v= query isn't bumped.
    Cache-Control = "public, max-age=0, must-revalidate"

