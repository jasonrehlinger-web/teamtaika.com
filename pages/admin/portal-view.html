<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client View — Taika Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/portal.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --gold: #c9a84c; --navy: #0a1628; --radius-sm: 6px; }
    body { margin: 0; background: #f5f4f0; font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Admin nav (matches other admin pages) ── */
    .admin-nav {
      display: flex; align-items: center; gap: 1rem;
      background: var(--navy); padding: 0 1.5rem; height: 54px; flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(255,255,255,.06);
    }
    .admin-nav-brand { display: flex; align-items: center; gap: 8px; text-decoration: none; color: #fff; font-weight: 700; font-size: .9rem; margin-right: 8px; white-space: nowrap; }
    .admin-nav-brand .shield { font-size: 1rem; }
    .admin-nav-links { display: flex; gap: 4px; flex: 1; }
    .admin-nav-links a { color: rgba(255,255,255,.65); text-decoration: none; font-size: 13.5px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius-sm); transition: all .15s; }
    .admin-nav-links a:hover { color: #fff; background: rgba(255,255,255,.08); }
    .admin-nav-links a.active { color: var(--gold); background: rgba(201,168,76,.12); }
    .admin-nav-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .admin-nav-user { color: rgba(255,255,255,.55); font-size: .8rem; }
    .btn-signout { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15); border-radius: 6px; color: rgba(255,255,255,.7); font-size: .8rem; padding: 5px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }
    .btn-signout:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* ── Portal tab bar ── */
    .portal-tabs {
      display: flex; align-items: center; gap: 4px;
      background: #fff; border-bottom: 1px solid #e5e3dc;
      padding: 0 1.25rem; height: 46px; flex-shrink: 0;
    }
    .portal-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: .82rem; font-weight: 500; color: #6b7280;
      border: none; background: none; font-family: 'DM Sans', sans-serif;
      transition: all .15s; text-decoration: none; white-space: nowrap;
    }
    .portal-tab:hover { background: #f3f4f6; color: #1f2937; }
    .portal-tab.active { background: rgba(201,168,76,.12); color: #92630a; font-weight: 700; }
    .portal-tab-icon { font-size: .9rem; }
    .tab-sep { width: 1px; height: 20px; background: #e5e3dc; margin: 0 4px; }
    .portal-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #9ca3af; padding: 0 8px; white-space: nowrap;
    }
    .open-tab-btn {
      margin-left: auto; display: flex; align-items: center; gap: 5px;
      font-size: .78rem; color: #6b7280; text-decoration: none;
      padding: 5px 12px; border-radius: 6px; border: 1px solid #e5e3dc;
      background: #fff; transition: all .15s; white-space: nowrap;
    }
    .open-tab-btn:hover { border-color: #c9a84c; color: #92630a; }

    /* ── iframe ── */
    .iframe-wrap { flex: 1; position: relative; overflow: hidden; }
    #portal-frame {
      width: 100%; height: 100%; border: none;
      display: block; background: #f5f4f0;
    }
    .iframe-loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #f5f4f0; pointer-events: none; transition: opacity .3s;
    }
    .iframe-loading.hidden { opacity: 0; }
    .loading-spinner {
      width: 28px; height: 28px; border: 3px solid #e5e3dc;
      border-top-color: #c9a84c; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-label { font-size: .85rem; color: #9ca3af; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <a class="admin-nav-brand" href="/admin/dashboard">
    <span class="shield">🛡</span>
    <span>Taika Admin</span>
  </a>
  <div class="admin-nav-links">
    <a href="/admin/dashboard">Dashboard</a>
    <a href="/admin/projects">Projects</a>
    <a href="/admin/clients">Clients</a>
    <a href="/admin/team">Team</a>
    <a href="/admin/portal-view" class="active">Client View</a>
  </div>
  <div class="admin-nav-right">
    <span class="admin-nav-user" id="nav-username">—</span>
    <button class="btn-signout" id="btn-signout">Sign Out</button>
  </div>
</nav>

<!-- Portal page tabs -->
<div class="portal-tabs" id="portal-tabs">
  <span class="portal-label">Portal pages:</span>
  <button class="portal-tab active" data-path="/portal/dashboard" onclick="loadPage(this)">
    <span class="portal-tab-icon">🏠</span> Dashboard
  </button>
  <button class="portal-tab" data-path="/portal/projects" onclick="loadPage(this)">
    <span class="portal-tab-icon">📋</span> My Projects
  </button>
  <button class="portal-tab" data-path="/portal/submit" onclick="loadPage(this)">
    <span class="portal-tab-icon">➕</span> Submit Project
  </button>
  <button class="portal-tab" data-path="/portal/translate" onclick="loadPage(this)">
    <span class="portal-tab-icon">⚡</span> MT Preview
  </button>
  <button class="portal-tab" data-path="/portal/account" onclick="loadPage(this)">
    <span class="portal-tab-icon">👤</span> Account
  </button>
  <div class="tab-sep"></div>
  <button class="portal-tab" data-path="/portal" onclick="loadPage(this)">
    <span class="portal-tab-icon">🔑</span> Landing / Login
  </button>
  <a class="open-tab-btn" id="open-new-tab" href="/portal/dashboard" target="_blank">
    ↗ Open in new tab
  </a>
</div>

<!-- iFrame -->
<div class="iframe-wrap">
  <div class="iframe-loading" id="iframe-loading">
    <div class="loading-spinner"></div>
    <span class="loading-label">Loading portal…</span>
  </div>
  <iframe id="portal-frame" src="/portal/dashboard" title="Client Portal Preview"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const SUPABASE_URL = 'https://ijwgdzrunkxrpzsrcqir.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_UmQ1ni6871mzup_Wz7oO6w_pbqYinV5';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Auth guard
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/portal'; return; }

  // Role guard — admin/super_admin only
  const { data: profile } = await sb.from('profiles').select('full_name, role').eq('id', session.user.id).single();
  if (!profile || !['admin','super_admin'].includes(profile.role)) {
    window.location.href = '/portal/dashboard';
    return;
  }

  document.getElementById('nav-username').textContent = profile.full_name || session.user.email;

  document.getElementById('btn-signout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/portal';
  });
})();

const frame = document.getElementById('portal-frame');
const loading = document.getElementById('iframe-loading');
const openLink = document.getElementById('open-new-tab');

frame.addEventListener('load', () => {
  loading.classList.add('hidden');
});

function loadPage(btn) {
  // Update active tab
  document.querySelectorAll('.portal-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const path = btn.getAttribute('data-path');
  loading.classList.remove('hidden');
  frame.src = path;
  openLink.href = path;
}
</script>
</body>
</html>
