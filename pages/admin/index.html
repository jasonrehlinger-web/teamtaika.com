<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Taika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/portal.css" />
  <style>
    :root {
      --navy: #0B1E35;
      --gold: #B8913A;
      --white: #F9F8F5;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(184,145,58,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(184,145,58,.04) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── Card ── */
    .login-card {
      position: relative;
      background: var(--white);
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      width: 100%;
      max-width: 400px;
      margin: 1.5rem;
      padding: 2.5rem 2.25rem 2rem;
    }

    /* ── Logo area ── */
    .admin-logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .shield-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      background: var(--navy);
      border-radius: 12px;
      margin-bottom: .85rem;
    }

    .shield-icon svg {
      width: 30px;
      height: 30px;
      fill: var(--gold);
    }

    .admin-logo h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--navy);
      margin: 0 0 .2rem;
    }

    .admin-logo .subtitle {
      font-size: .85rem;
      color: #8a7e72;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .35rem;
    }

    .form-group input {
      width: 100%;
      padding: .7rem .9rem;
      border: 1.5px solid #d0cdc8;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--navy);
      background: var(--white);
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus {
      border-color: var(--gold);
    }

    /* ── Sign in button ── */
    .btn-signin {
      display: block;
      width: 100%;
      padding: .75rem;
      margin-top: 1.4rem;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      letter-spacing: .02em;
    }

    .btn-signin:hover:not(:disabled) { background: #a07d30; }
    .btn-signin:disabled { opacity: .55; cursor: not-allowed; }

    /* ── Error ── */
    #login-error {
      display: none;
      margin-top: .9rem;
      padding: .65rem .9rem;
      background: #fdecea;
      border: 1px solid #f5b7b3;
      border-radius: 6px;
      color: #b71c1c;
      font-size: .88rem;
      line-height: 1.45;
    }

    #login-error.visible { display: block; }

    /* ── Access denied ── */
    #access-denied {
      display: none;
      text-align: center;
      padding: 1rem 0 .5rem;
    }

    #access-denied.visible { display: block; }

    #access-denied .denied-icon {
      font-size: 2.5rem;
      margin-bottom: .5rem;
    }

    #access-denied p {
      color: #b71c1c;
      font-weight: 500;
      font-size: .95rem;
      margin: 0 0 .75rem;
    }

    /* ── Footer link ── */
    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: .87rem;
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { text-decoration: underline; }

    .divider {
      height: 1px;
      background: #e5e2dd;
      margin: 1.25rem 0;
    }
  </style>
</head>
<body>

<div class="login-card" id="login-card" style="visibility:hidden">

  <!-- Logo -->
  <div class="admin-logo">
    <div class="shield-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6L12 2zm-1 14l-3-3 1.41-1.41L11 13.17l4.59-4.58L17 10l-6 6z"/>
      </svg>
    </div>
    <h1>Taika Admin</h1>
    <p class="subtitle">Administration Portal</p>
  </div>

  <!-- Login form -->
  <div id="form-area">
    <form id="admin-login-form" novalidate>
      <div class="form-group">
        <label for="admin-email">Email</label>
        <input
          type="email"
          id="admin-email"
          name="email"
          required
          autocomplete="email"
          placeholder="admin@teamtaika.com"
        />
      </div>
      <div class="form-group">
        <label for="admin-password">Password</label>
        <input
          type="password"
          id="admin-password"
          name="password"
          required
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      <button type="submit" class="btn-signin" id="signin-btn">Sign In</button>

      <div id="login-error"></div>
    </form>

    <!-- Access denied state (replaces form content) -->
    <div id="access-denied">
      <div class="denied-icon">🔒</div>
      <p>Access denied. This area is restricted to administrators.</p>
      <a href="/portal" style="color:var(--gold);font-size:.9rem;">← Return to Client Portal</a>
    </div>
  </div>

  <div class="divider"></div>

  <div class="card-footer">
    <a href="/portal">← Client Portal</a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../js/portal.js"></script>
<script>
(async function () {
  'use strict';

  const SUPABASE_URL     = 'https://ijwgdzrunkxrpzsrcqir.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_UmQ1ni6871mzup_Wz7oO6w_pbqYinV5';
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ADMIN_ROLES = ['admin', 'super_admin'];

  function showError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    const el = document.getElementById('login-error');
    el.classList.remove('visible');
    el.textContent = '';
  }

  function showAccessDenied() {
    document.getElementById('admin-login-form').style.display = 'none';
    document.getElementById('access-denied').classList.add('visible');
  }

  async function getProfile(accessToken) {
    // Use server function to bypass broken RLS recursive policy
    const res = await fetch('/.netlify/functions/get-profile', {
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    if (!res.ok) return null;
    return await res.json();
  }

  /* ── Check existing session on load ── */
  const { data: { session: existingSession } } = await client.auth.getSession();

  if (existingSession) {
    const profile = await getProfile(existingSession.access_token);
    if (profile && ADMIN_ROLES.includes(profile.role)) {
      window.location.href = '/admin/dashboard';
      return;
    } else {
      showAccessDenied();
    }
  }
  // No valid admin session — reveal the login form
  document.getElementById('login-card').style.visibility = 'visible';

  /* ── Login form submit ── */
  document.getElementById('admin-login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    const email    = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const btn      = document.getElementById('signin-btn');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    const { data, error } = await client.auth.signInWithPassword({ email, password });

    if (error) {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      showError('Invalid email or password.');
      return;
    }

    const profile = await getProfile(data.session.access_token);

    if (!profile || !ADMIN_ROLES.includes(profile.role)) {
      await client.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Sign In';
      showAccessDenied();
      return;
    }

    /* Success — redirect to dashboard */
    window.location.href = '/admin/dashboard';
  });

})();
</script>
</body>
</html>
